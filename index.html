<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Store - Zona PC</title>
    <style>
        /* Estética Zona PC: Negro y Amarillo */
        body { 
            background-color: #000; 
            color: #ffcc00; 
            font-family: 'Segoe UI', Arial, sans-serif; 
            text-align: center; 
            padding: 20px; 
            margin: 0;
        }
        .container { max-width: 600px; margin: auto; }
        h1 { 
            font-size: 2.2rem; 
            border-bottom: 3px solid #ffcc00; 
            display: inline-block; 
            padding-bottom: 10px;
            margin-top: 20px;
            text-transform: uppercase;
        }
        .boton { 
            display: block; 
            width: 85%; 
            margin: 30px auto; 
            padding: 25px; 
            background-color: #ffcc00; 
            color: #000; 
            text-decoration: none; 
            font-weight: bold; 
            border-radius: 20px; 
            font-size: 1.4rem;
            box-shadow: 0px 8px 15px rgba(255, 204, 0, 0.2);
            transition: 0.3s;
        }
        .boton:active { transform: scale(0.95); background-color: #e6b800; }
        
        .nota {
            background-color: #1a1a1a;
            padding: 15px;
            border-radius: 10px;
            margin-top: 50px;
            font-size: 0.8rem;
            color: #888;
            border: 1px solid #333;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>DIGITAL STORE</h1>
        <p style="font-size: 1.1rem; margin-top: 10px;">Seleccioná una aplicación para instalar</p>

        <a href="intent://github.com/ABREGUR2011/Digital-Store/raw/refs/heads/main/Digital%20Store%201.0.0.apk#Intent;scheme=https;action=android.intent.action.VIEW;type=application/vnd.android.package-archive;end" class="boton">
            🚀 DESCARGAR E INSTALAR
        </a>

        <div class="nota">
            <b>ZONA PC - Servicio Técnico</b><br>
            Si la aplicación no inicia la instalación, verificá que el permiso de "Orígenes Desconocidos" esté activado en la TV Box.
        </div>
    </div>

</body>
</html>

</body>
</html>
