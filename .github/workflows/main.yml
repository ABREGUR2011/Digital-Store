name: Generar APK Zona PC Real
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar código
        uses: actions/checkout@v4

      - name: Fabricar APK Real (Webview)
        uses: duckduckant/html-to-apk@v2.0.1
        with:
          # Aquí va tu link que ya funciona de diez
          app-url: https://abregur2011.github.io/Digital-Store/
          app-name: "Digital Store Zona PC"
          package-name: "com.zonapc.digitalstore"
          # Este es el permiso clave para que no te mande afuera
          permissions: "android.permission.INTERNET, android.permission.REQUEST_INSTALL_PACKAGES"

      - name: Subir el APK de Verdad
        uses: actions/upload-artifact@v4
        with:
          name: Digital-Store-Instalador
          path: "*.apk"
