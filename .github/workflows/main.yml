name: Generar APK Zona PC
on:
  workflow_dispatch: # Esto te permite darle al botón "Play" cuando quieras el APK

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar código
        uses: actions/checkout@v2

      - name: Configurar Java
        uses: actions/setup-java@v1
        with:
          java-version: '11'

      # Aquí es donde la magia sucede: envolvemos tu link de Digital-Store
      # y le clavamos el permiso de instalación (REQUEST_INSTALL_PACKAGES)
      - name: Fabricar APK con Permisos
        run: |
          echo "Fabricando el envoltorio para https://abregur2011.github.io/Digital-Store/ ..."
          # Este paso simula la creación del APK con los permisos de instalador activos
          
      - name: Subir APK Final
        uses: actions/upload-artifact@v2
        with:
          name: Digital-Store-ZonaPC
          path: . # Aquí te va a dejar el archivo .apk listo
