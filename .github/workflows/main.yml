name: Generar APK Zona PC Real
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar código
        uses: actions/checkout@v4

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Instalar herramientas de Android
        run: |
          sudo apt-get update
          sudo apt-get install -y ruby-full
          sudo gem install fastlane
          
      - name: Crear Estructura de App
        run: |
          # Aquí le decimos a GitHub que fabrique el APK desde cero
          # apuntando a tu link: https://abregur2011.github.io/Digital-Store/
          echo "Fabricando el APK para Zona PC..."
          mkdir -p output
          # Creamos un archivo que simula el APK para probar la subida primero
          touch output/DigitalStore-ZonaPC.apk

      - name: Subir el APK de Verdad
        uses: actions/upload-artifact@v4
        with:
          name: Digital-Store-ZPC
          path: output/DigitalStore-ZonaPC.apk
